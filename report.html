<!DOCTYPE html>
<html>
<head>
    <title>Report Damage - Road Damage Reporting System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">Road Damage Reporting System</div>
        <ul class="nav-links">
            <li><a href="./">Home</a></li>
            <li><a href="report.html" class="active">Report Damage</a></li>
            <li><a href="map.html">Map</a></li>
            <li><a href="status.html">Status</a></li>
            <li><a href="admin.html">Admin</a></li>
        </ul>
    </nav>
</header>

<main class="hero-section">
    <div class="login-container">
        <h2>Upload Road Damage</h2>
        <form>
            <label>Upload Image</label>
            <div class="file-upload">
                <input type="file" id="damage-image" hidden>
                <label for="damage-image" class="file-label">Choose Image</label>
            </div>
            
            <label>Location</label>
            <input type="text" placeholder="Enter street or coordinates">
            
            <label>Description</label>
            <textarea placeholder="Describe the damage..."></textarea>
            
            <button type="button" class="cta-button" style="width: 100%; margin-top: 10px;">Submit Report</button>
        </form>
    </div>
</main>

</body>
</html>
