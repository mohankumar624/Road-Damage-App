<!DOCTYPE html>
<html>
<head>
<title>Login - Road Damage Reporting</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <nav class="navbar">
        <div class="logo">Road Damage Reporting System</div>
        <ul class="nav-links">
            <li><a href="./">Home</a></li>
            <li><a href="report.html">Report Damage</a></li>

<main class="hero-section">
    <div class="login-container">
        <h2>User Login</h2>
        <form action="login.html">

<label>Username</label>
<input type="text" placeholder="Enter Username">

<label>Password</label>
<input type="password" placeholder="Enter Password">

<button type="submit">Login</button>

</form>

<p>Don't have an account?</p>

<button class="signup" onclick="window.location.href='signup.html'">Sign Up</button>
<button class="signin" onclick="window.location.href='login.html'">Sign In</button>

<hr>

<h2>Admin Login</h2>

<form action="admin.html">

<label>Username</label>
<input type="text">

<label>Password</label>
<input type="password">

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
